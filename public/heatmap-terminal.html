<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CryptoStatix PRO - Multi-Mode Heatmap with Help</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #020617; /* Midnight Blue */
            --card-bg: #0f172a;
            --border-color: #1e293b;
            --accent: #38bdf8; /* Cyberpunk Blue */
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --panel-bg: #1e293b;
        }

        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: 'Inter', sans-serif; margin: 0; padding: 20px; overflow-x: hidden; 
        }
        
        .terminal-card {
            background: var(--card-bg); border: 1px solid var(--border-color); 
            border-radius: 4px; padding: 15px; width: 100%; max-width: 1000px; 
            margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.7); position: relative;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;
        }

        .controls { display: flex; gap: 5px; align-items: center; }

        .btn {
            background: #1e293b; border: 1px solid #334155; color: #94a3b8;
            padding: 5px 12px; font-size: 11px; cursor: pointer; border-radius: 2px;
            text-transform: uppercase; transition: all 0.2s; font-family: monospace;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        .btn-help {
            background: transparent; border: 1px solid #334155; color: var(--text-dim);
            padding: 5px 10px; font-size: 11px; border-radius: 2px; cursor: pointer;
            transition: all 0.2s; font-family: monospace;
        }
        .btn-help:hover { border-color: var(--text-main); color: var(--text-main); background: rgba(255,255,255,0.05); }

        #heatmap-container { width: 100%; height: 550px; position: relative; cursor: crosshair; }

        .tooltip {
            position: absolute; background: rgba(15, 23, 42, 0.9); color: #fff; padding: 12px;
            border-radius: 4px; font-size: 12px; pointer-events: none; opacity: 0;
            border: 1px solid var(--accent); z-index: 100; backdrop-filter: blur(5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); font-family: monospace;
        }

        .treemap-rect { stroke: var(--bg-color); stroke-width: 2px; transition: fill 0.3s; }
        .label-symbol { fill: #fff; font-size: 14px; font-weight: 800; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        .label-val { fill: #fff; font-size: 11px; pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 999; opacity: 0; visibility: hidden;
            transition: all 0.3s ease; backdrop-filter: blur(3px);
        }
        .overlay.active { opacity: 1; visibility: visible; }

        .help-panel {
            position: fixed; top: 0; right: -350px; 
            width: 300px; height: 100%; background: var(--panel-bg);
            border-left: 1px solid var(--border-color); z-index: 1000;
            padding: 25px; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            transition: right 0.3s ease; 
            overflow-y: auto;
        }
        .help-panel.active { right: 0; }

        .close-help {
            position: absolute; top: 15px; right: 20px; background: transparent;
            border: none; color: var(--text-dim); font-size: 22px; cursor: pointer;
            transition: color 0.2s;
        }
        .close-help:hover { color: var(--accent); }

        .help-content h2 { color: var(--accent); font-size: 16px; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; }
        .help-content h3 { font-size: 13px; margin-bottom: 5px; color: var(--text-main); }
        .help-content p { color: var(--text-dim); font-size: 12px; line-height: 1.6; margin-top: 0; }
        .help-content ul { padding-left: 15px; color: var(--text-dim); font-size: 12px; }
        .help-content li { margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="terminal-card">
        <div class="header">
            <div class="controls">
                <button class="btn active" id="btn-vol" onclick="updateMode('vol', this)">Volume 24h</button>
                <button class="btn" id="btn-mcap" onclick="updateMode('mcap', this)">Market Cap</button>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div id="status" style="color: var(--accent); font-size: 11px; font-family: monospace;">LOADING...</div>
                <button class="btn-help" id="help-trigger" onclick="toggleHelp(true)">Справка ?</button>
            </div>
        </div>
        <div id="heatmap-container"></div>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <div id="help-overlay" class="overlay" onclick="toggleHelp(false)"></div>
    <div id="help-panel" class="help-panel">
        <button class="close-help" onclick="toggleHelp(false)">×</button>
        <div class="help-content" id="help-content"></div>
    </div>

    <script>
        function initLanguage() {
            const lang = localStorage.getItem('selectedLanguage') || 'RUS';
            const translations = {
                'ENG': {
                    vol: 'Volume 24h',
                    mcap: 'Market Cap',
                    helpBtn: 'Guide ?',
                    header: 'CryptoStatix PRO',
                    intro: 'Liquidity Heatmap for the Top 25 Cryptocurrencies.',
                    readTitle: 'How to read the map:',
                    readIntro: 'The map visualizes data through block size and color.',
                    sizeTitle: 'Block Size',
                    sizeVol: '<b>Volume 24h:</b> Size is based on trading volume. The larger the block, the higher the liquidity right now.',
                    sizeMcap: '<b>Market Cap:</b> Size is based on market capitalization. Shows the coin\'s market dominance.',
                    colorTitle: 'Block Color (Momentum)',
                    colorIntro: 'Shows the price change over the last 24 hours:',
                    colorUp: '<span style="color:#22c55e">■ Bright Green</span>: Strong growth (>5%).',
                    colorNeutral: '<span style="color:#334155">■ Gray</span>: Flat (0%).',
                    colorDown: '<span style="color:#ef4444">■ Bright Red</span>: Sharp decline (<-5%).',
                    interTitle: 'Interactivity',
                    interDesc: 'Hover over a block to see exact price, volume, and market cap values.',
                    footer: 'Powered by D3.js & CoinGecko API. Updated every minute.',
                    ttpPrice: 'Price', ttpVol: '24h Vol', ttpMcap: 'M.Cap', ttpChange: 'Change'
                },
                'UKR': {
                    vol: 'Об’єм 24г',
                    mcap: 'Капіталізація',
                    helpBtn: 'Довідка ?',
                    header: 'CryptoStatix PRO',
                    intro: 'Теплова карта ліквідності для Топ-25 криптовалют.',
                    readTitle: 'Як читати карту:',
                    readIntro: 'Карта візуалізує дані через розмір та колір блоків.',
                    sizeTitle: 'Розмір блоку',
                    sizeVol: '<b>Volume 24h:</b> Розмір залежить від обсягу торгів. Чим більший блок, тим вища ліквідність прямо зараз.',
                    sizeMcap: '<b>Market Cap:</b> Розмір залежить від ринкової капіталізації. Показує домінування монети на ринку.',
                    colorTitle: 'Колір блоку (Імпульс)',
                    colorIntro: 'Показує зміну ціни за 24 години:',
                    colorUp: '<span style="color:#22c55e">■ Яскр.-зелений</span>: Сильне зростання (>5%).',
                    colorNeutral: '<span style="color:#334155">■ Сірий</span>: Флет (0%).',
                    colorDown: '<span style="color:#ef4444">■ Яскр.-червоний</span>: Сильне падіння (<-5%).',
                    interTitle: 'Інтерактивність',
                    interDesc: 'Наведіть курсор на блок, щоб побачити точні значення ціни, обсягу та капіталізації.',
                    footer: 'Powered by D3.js & CoinGecko API. Оновлення раз на хвилину.',
                    ttpPrice: 'Ціна', ttpVol: 'Об’єм 24г', ttpMcap: 'Кап-ція', ttpChange: 'Зміна'
                },
                'RUS': {
                    vol: 'Объем 24ч',
                    mcap: 'Кап-ция',
                    helpBtn: 'Справка ?',
                    header: 'CryptoStatix PRO',
                    intro: 'Тепловая карта ликвидности для Топ-25 криптовалют.',
                    readTitle: 'Как читать карту:',
                    readIntro: 'Карта визуализирует данные через размер и цвет блоков.',
                    sizeTitle: 'Размер блока',
                    sizeVol: '<b>Volume 24h:</b> Размер зависит от объема торгов. Чем больше блок, тем выше ликвидность прямо сейчас.',
                    sizeMcap: '<b>Market Cap:</b> Размер зависит от рыночной капитализации. Показывает доминирование монеты на рынке.',
                    colorTitle: 'Цвет блока (Импульс)',
                    colorIntro: 'Показует изменение цены за 24 часа:',
                    colorUp: '<span style="color:#22c55e">■ Ярко-зеленый</span>: Сильный рост (>5%).',
                    colorNeutral: '<span style="color:#334155">■ Серый</span>: Флэт (0%).',
                    colorDown: '<span style="color:#ef4444">■ Ярко-красный</span>: Сильное падение (<-5%).',
                    interTitle: 'Интерактивность',
                    interDesc: 'Наведите курсор на блок, чтобы увидеть точные значения цены, объема и капитализации.',
                    footer: 'Powered by D3.js & CoinGecko API. Обновление раз в минуту.',
                    ttpPrice: 'Цена', ttpVol: 'Объем 24ч', ttpMcap: 'М.Кап', ttpChange: 'Изм.'
                }
            };

            const t = translations[lang] || translations['RUS'];
            window.ttpLabels = t;

            document.getElementById('btn-vol').textContent = t.vol;
            document.getElementById('btn-mcap').textContent = t.mcap;
            document.getElementById('help-trigger').textContent = t.helpBtn;
            
            document.getElementById('help-content').innerHTML = `
                <h2>${t.header}</h2>
                <p>${t.intro}</p>
                <h3>${t.readTitle}</h3>
                <p>${t.readIntro}</p>
                <h3>${t.sizeTitle}</h3>
                <ul>
                    <li>${t.sizeVol}</li>
                    <li>${t.sizeMcap}</li>
                </ul>
                <h3>${t.colorTitle}</h3>
                <p>${t.colorIntro}</p>
                <ul>
                    <li>${t.colorUp}</li>
                    <li>${t.colorNeutral}</li>
                    <li>${t.colorDown}</li>
                </ul>
                <h3>${t.interTitle}</h3>
                <p>${t.interDesc}</p>
                <p style="font-size: 10px; color: #64748b; margin-top: 30px; border-top: 1px solid #334155; padding-top: 10px;">
                    ${t.footer}
                </p>
            `;
        }

        function toggleHelp(show) {
            const panel = document.getElementById('help-panel');
            const overlay = document.getElementById('help-overlay');
            if (show) {
                panel.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden'; 
            } else {
                panel.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = ''; 
            }
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') toggleHelp(false);
        });

        let currentData = [];
        let currentMode = 'vol'; 
        const tooltip = d3.select("#tooltip");

        async function loadData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=25&page=1&sparkline=false');
                currentData = await response.json();
                document.getElementById('status').innerText = '● LIVE';
                render();
            } catch (e) {
                document.getElementById('status').innerText = 'API LIMIT';
            }
        }

        function updateMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const container = d3.select("#heatmap-container");
            if (!container.node()) return;
            const width = container.node().offsetWidth;
            const height = 550;
            container.html("");
            
            const t = window.ttpLabels || { ttpPrice: 'Price', ttpVol: '24h Vol', ttpMcap: 'M.Cap', ttpChange: 'Change' };

            const root = d3.hierarchy({
                children: currentData.map(d => ({
                    name: d.symbol.toUpperCase(),
                    vol: d.total_volume,
                    mcap: d.market_cap,
                    change: d.price_change_percentage_24h,
                    price: d.current_price
                }))
            })
            .sum(d => currentMode === 'vol' ? d.vol : d.mcap)
            .sort((a, b) => (currentMode === 'vol' ? b.data.vol - a.data.vol : b.data.mcap - a.data.mcap));

            d3.treemap().size([width, height]).paddingInner(2)(root);

            const colorScale = d3.scaleLinear()
                .domain([-5, 0, 5])
                .range(["#ef4444", "#334155", "#22c55e"])
                .clamp(true);

            const svg = container.append("svg").attr("width", width).attr("height", height);
            const leaf = svg.selectAll("g")
                .data(root.leaves())
                .enter().append("g")
                .attr("transform", d => `translate(${d.x0},${d.y0})`);

            leaf.append("rect")
                .attr("class", "treemap-rect")
                .attr("width", d => d.x1 - d.x0)
                .attr("height", d => d.y1 - d.y0)
                .attr("fill", d => colorScale(d.data.change))
                .on("mousemove", (event, d) => {
                    tooltip.style("opacity", 1)
                        .html(`
                            <b style="color:var(--accent)">${d.data.name}</b><br/>
                            ${t.ttpPrice}: $${d.data.price.toLocaleString()}<br/>
                            ${t.ttpVol}: $${(d.data.vol / 1e6).toFixed(2)}M<br/>
                            ${t.ttpMcap}: $${(d.data.mcap / 1e9).toFixed(2)}B<br/>
                            ${t.ttpChange}: ${d.data.change.toFixed(2)}%
                        `)
                        .style("left", (event.pageX + 15) + "px")
                        .style("top", (event.pageY - 20) + "px");
                })
                .on("mouseout", () => tooltip.style("opacity", 0));

            leaf.append("text")
                .attr("class", "label-symbol")
                .attr("x", 8)
                .attr("y", 22)
                .text(d => (d.x1 - d.x0 > 45) ? d.data.name : "");

            leaf.append("text")
                .attr("class", "label-val")
                .attr("x", 8)
                .attr("y", 38)
                .text(d => (d.y1 - d.y0 > 50) ? d.data.change.toFixed(2) + "%" : "");
        }

        initLanguage();
        window.addEventListener('resize', render);
        loadData();
        setInterval(loadData, 60000); 

        let lastLang = localStorage.getItem('selectedLanguage');
        setInterval(() => {
            const currentLang = localStorage.getItem('selectedLanguage');
            if (currentLang !== lastLang) {
                lastLang = currentLang;
                initLanguage();
                render();
            }
        }, 1000);
    </script>
</body>
</html>
