<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CryptoStatix PRO - Ultimate Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root {
            --bg-main: #05070a;
            --bg-card: #0d1117;
            --accent: #00f2ff;
            --border: rgba(0, 242, 255, 0.2);
            --white: #ffffff;
            --dim: #555;
        }

        body { 
            background: var(--bg-main); 
            color: var(--white); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0; 
        }

        .dashboard { width: 100%; max-width: 650px; display: flex; flex-direction: column; gap: 20px; }
        
        .widget-box { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 25px; 
            padding: 20px; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.05); 
            position: relative;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h2 { 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.8rem; 
            margin: 0; 
        }

        .refresh-badge {
            font-family: monospace;
            font-size: 10px;
            color: var(--accent);
            background: rgba(0, 242, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--accent);
        }

        .label-hint { 
            text-align: center; 
            color: var(--dim); 
            font-size: 0.7rem; 
            margin-bottom: 10px; 
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="widget-box">
        <div class="header-container">
            <h2>Global Exchange Radar</h2>
            <div id="statusBadge" class="refresh-badge">Syncing...</div>
        </div>
        <div class="label-hint">Кликните на сектор для фильтрации данных</div>
        <canvas id="radarChart"></canvas>
    </div>

    <div class="widget-box">
        <div class="header-container">
            <h2>Momentum: <span id="currentEx" style="color:#00f2ff">Market</span></h2>
        </div>
        <canvas id="bubbleChart"></canvas>
    </div>
</div>

<script>
    Chart.register(ChartDataLabels);

    // --- Плагин для логотипа в центре ---
    const centerTextPlugin = {
        id: 'centerText',
        afterDraw: (chart) => {
            if (chart.config.type !== 'doughnut') return;
            const { ctx, chartArea: { top, bottom, left, right } } = chart;
            const centerX = (left + right) / 2;
            const centerY = (top + bottom) / 2;
            ctx.save();
            ctx.font = 'bold 15px sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('CryptoStatix', centerX, centerY - 8);
            ctx.font = '900 10px monospace';
            ctx.fillStyle = '#00f2ff';
            ctx.fillText('PRO TERMINAL', centerX, centerY + 10);
            ctx.restore();
        }
    };
    Chart.register(centerTextPlugin);

    let radarChart, bubbleChart;
    let marketCoins = [];

    // Инициализация и получение данных
    async function initDashboard() {
        const badge = document.getElementById('statusBadge');
        try {
            badge.innerText = "Sync: FETCHING";
            // Получаем ТОП-50 монет для быстрого маневрирования данными
            const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=50&page=1');
            const data = await response.json();
            
            marketCoins = data.map(m => ({
                label: m.symbol.toUpperCase(),
                x: Math.floor(Math.random() * 40) + 50, // Симуляция Hype (50-90)
                y: m.price_change_percentage_24h ? m.price_change_percentage_24h.toFixed(2) : 0,
                r: Math.min(Math.max(m.total_volume / 1000000000 * 5, 8), 35) // Размер от объема
            }));

            renderRadar();
            updateBubble("Binance"); // По умолчанию стартуем с Binance
            badge.innerText = "Sync: OK";
        } catch (e) {
            badge.innerText = "API Limit";
            console.error("Fetch error:", e);
        }
    }

    // Отрисовка Radar (8 бирж + Others)
    function renderRadar() {
        const labels = ['Binance', 'Bybit', 'OKX', 'Coinbase', 'Kraken', 'KuCoin', 'Gate.io', 'HTX', 'Others'];
        const dataValues = [30, 15, 12, 10, 8, 7, 6, 6, 6]; 
        const colors = ['#FF3D00', '#FF9100', '#00E676', '#00B8D4', '#2979FF', '#AA00FF', '#FF4081', '#FFEA00', '#222'];

        if (radarChart) radarChart.destroy();

        radarChart = new Chart(document.getElementById('radarChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: dataValues,
                    backgroundColor: colors,
                    borderColor: '#0d1117',
                    borderWidth: 2,
                    hoverOffset: 12
                }]
            },
            options: {
                cutout: '55%', // Размер центральной части
                onClick: (e, el) => {
                    if (el.length > 0) {
                        const name = labels[el[0].index];
                        updateBubble(name);
                    }
                },
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        color: '#fff',
                        font: { weight: 'bold', size: 9 },
                        formatter: (v, ctx) => ctx.chart.data.labels[ctx.dataIndex] + '\n' + v + '%'
                    }
                }
            }
        });
    }

    // Обновление пузырьков при клике
    function updateBubble(name) {
        document.getElementById('currentEx').innerText = name;
        // Случайная выборка из 8 монет для эффекта смены биржи
        const filtered = [...marketCoins].sort(() => 0.5 - Math.random()).slice(0, 8);

        if (bubbleChart) {
            bubbleChart.data.datasets[0].data = filtered;
            bubbleChart.data.datasets[0].label = name;
            bubbleChart.update();
        } else {
            renderBubble(filtered, name);
        }
    }

    // Отрисовка пузырькового графика с кастомным тултипом
    function renderBubble(data, name) {
        const ctx = document.getElementById('bubbleChart').getContext('2d');
        bubbleChart = new Chart(ctx, {
            type: 'bubble',
            data: {
                datasets: [{
                    label: name,
                    data: data,
                    backgroundColor: 'rgba(0, 242, 255, 0.3)',
                    borderColor: '#00f2ff',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    x: { min: 40, max: 100, grid: { color: '#1a1a1a' }, title: { display: true, text: 'Hype Index', color: '#555' } },
                    y: { grid: { color: '#1a1a1a' }, title: { display: true, text: 'Volatility % (24h)', color: '#555' } }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        enabled: true,
                        backgroundColor: 'rgba(13, 17, 23, 0.95)',
                        titleColor: '#00f2ff',
                        borderColor: '#00f2ff',
                        borderWidth: 1,
                        displayColors: false,
                        callbacks: {
                            title: (ctx) => `Asset: ${ctx[0].raw.label}`,
                            label: (ctx) => {
                                const v = ctx.raw;
                                return [
                                    `• Social Hype: ${v.x}/100`,
                                    `• 24h Velocity: ${v.y}%`,
                                    `• Weight: ${v.r > 20 ? 'High' : 'Normal'}`
                                ];
                            }
                        }
                    },
                    datalabels: {
                        anchor: 'end', align: 'top', color: '#00f2ff',
                        font: { weight: 'bold' },
                        formatter: (v) => v.label
                    }
                }
            }
        });
    }

    initDashboard();
    // Автообновление данных каждые 2 минуты
    setInterval(initDashboard, 120000);
</script>
</body>
</html>
