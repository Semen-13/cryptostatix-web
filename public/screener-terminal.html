<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoStatix | 3x3 Grid Screener</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0f172a',
                        card: '#1e293b',
                        accent: '#00ff88',
                        'accent-glow': 'rgba(0, 255, 136, 0.3)',
                        down: '#ef4444',
                        up: '#22c55e'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Orbitron', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-bg text-white font-sans overflow-hidden;
            }
            ::-webkit-scrollbar {
                width: 6px;
            }
            ::-webkit-scrollbar-track {
                @apply bg-bg;
            }
            ::-webkit-scrollbar-thumb {
                @apply bg-slate-700 rounded-full;
            }
        }
        .chart-container {
            height: calc(100% - 30px);
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const BINANCE_REST_BASE = 'https://api.binance.com/api/v3';
        const BINANCE_WS_BASE = 'wss://stream.binance.com:9443/ws';

        const TRANSLATIONS = {
            'ENG': {
                volume: 'VOLUME',
                gainers: 'GAINERS',
                volatility: 'VOLATILITY',
                trades: 'TRADES',
                init: 'INITIALIZING SCANNER...',
                live: 'LIVE STREAMING',
                tf_1m: '1m',
                tf_5m: '5m',
                tf_15m: '15m',
                tf_1h: '1h',
                tf_1d: '1d',
                info_title: 'ABOUT GRID SCREENER',
                info_p1: 'Data Source: Displays Binance USDT pairs with > $10,000 daily volume, excluding leveraged tokens.',
                info_p2: 'Sorting: Ranked dynamically by the selected criteria (Volume, Gainers, Volatility, Trades).',
                info_p3: 'Guide: Click any chart to expand it to full screen. In full screen, you can change the timeframe for that specific pair independently.',
                header_grid: 'GRID ',
                header_screener: 'SCREENER PRO'
            },
            'RUS': {
                volume: 'ОБЪЕМ',
                gainers: 'ЛИДЕРЫ',
                volatility: 'ВОЛАТИЛЬНОСТЬ',
                trades: 'СДЕЛКИ',
                init: 'ИНИЦИАЛИЗАЦИЯ СКАНЕРА...',
                live: 'ПРЯМОЙ ЭФИР',
                tf_1m: '1 мин',
                tf_5m: '5 мин',
                tf_15m: '15 мин',
                tf_1h: '1 час',
                tf_1d: '1 день',
                info_title: 'О GRID SCREENER',
                info_p1: 'Источники: Отображаются USDT пары с Binance с суточным объемом > $10,000, исключая токены с плечом.',
                info_p2: 'Сортировка: Монеты ранжируются динамически по выбранному критерию (Объем, Лидеры, Волатильность, Сделки).',
                info_p3: 'Инструкция: Нажмите на любой график, чтобы развернуть его на весь экран. В полноэкранном режиме можно менять таймфрейм индивидуально для этой монеты.',
                header_grid: 'СЕТОЧНЫЙ ',
                header_screener: 'СКРИНЕР PRO'
            },
            'UKR': {
                volume: 'ОБСЯГ',
                gainers: 'ЛІДЕРИ',
                volatility: 'ВОЛАТИЛЬНІСТЬ',
                trades: 'УГОДИ',
                init: 'ІНІЦІАЛІЗАЦІЯ СКАНЕРА...',
                live: 'ПРЯМИЙ ЕФІР',
                tf_1m: '1 хв',
                tf_5m: '5 хв',
                tf_15m: '15 хв',
                tf_1h: '1 год',
                tf_1d: '1 день',
                info_title: 'ПРО GRID SCREENER',
                info_p1: 'Джерела: Відображаються USDT пари з Binance із добовим обсягом > $10,000, виключаючи токени з плечем.',
                info_p2: 'Сортування: Монети ранжуються динамічно за вибраним критерієм (Обсяг, Лідери, Волатильність, Угоди).',
                info_p3: 'Інструкція: Натисніть на будь-який графік, щоб розгорнути його на весь екран. У повноекранному режимі можна змінювати таймфрейм індивідуально для цієї монети.',
                header_grid: 'СІТКОВИЙ ',
                header_screener: 'СКРИНЕР PRO'
            }
        };

        // --- COMPONENTS ---

        const LoadingSpinner = ({ lang }) => (
            <div className="flex flex-col items-center justify-center h-screen space-y-4">
                <div className="w-12 h-12 border-4 border-accent border-t-transparent rounded-full animate-spin shadow-[0_0_15px_var(--accent-glow)]"></div>
                <div className="text-accent font-mono text-[10px] tracking-widest animate-pulse-slow">
                    {TRANSLATIONS[lang]?.init || TRANSLATIONS.ENG.init}
                </div>
            </div>
        );

        const ChartCell = ({ symbol, pairData, index, timeframe: globalTimeframe, isExpanded, onToggleExpand, t }) => {
            const chartContainerRef = useRef(null);
            const chartRef = useRef(null);
            const seriesRef = useRef(null);
            const wsRef = useRef(null);
            const [currentPrice, setCurrentPrice] = useState(null);
            const [localTimeframe, setLocalTimeframe] = useState(globalTimeframe);

            // Calculate stats
            const vol = pairData ? (((parseFloat(pairData.highPrice) - parseFloat(pairData.lowPrice)) / parseFloat(pairData.lowPrice)) * 100).toFixed(2) : '0.00';
            const priceChange = pairData ? parseFloat(pairData.priceChangePercent).toFixed(2) : '0.00';
            const volume = pairData ? (parseFloat(pairData.quoteVolume) / 1000000).toFixed(2) + 'M' : '0.00M';
            const trades = pairData ? pairData.count : 0;
            const isUp = parseFloat(priceChange) >= 0;

            useEffect(() => {
                if (!isExpanded) setLocalTimeframe(globalTimeframe);
            }, [globalTimeframe, isExpanded]);

            useEffect(() => {
                if (!chartContainerRef.current) return;
                
                const LW = window.LightweightCharts;
                if (!LW) return;

                const chart = LW.createChart(chartContainerRef.current, {
                    layout: {
                        background: { type: 'solid', color: 'transparent' },
                        textColor: '#94a3b8',
                        fontSize: 10,
                    },
                    grid: {
                        vertLines: { color: 'rgba(255, 255, 255, 0.03)' },
                        horzLines: { color: 'rgba(255, 255, 255, 0.03)' },
                    },
                    crosshair: { mode: LW.CrosshairMode.Normal },
                    rightPriceScale: { borderVisible: false, scaleMargins: { top: 0.2, bottom: 0.1 } },
                    timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false },
                    handleScroll: false,
                    handleScale: false,
                    width: chartContainerRef.current.clientWidth,
                    height: chartContainerRef.current.clientHeight,
                });

                const series = chart.addCandlestickSeries({
                    upColor: '#22c55e',
                    downColor: '#ef4444',
                    borderVisible: false,
                    wickUpColor: '#22c55e',
                    wickDownColor: '#ef4444',
                });

                chartRef.current = chart;
                seriesRef.current = series;

                const fetchHistory = async () => {
                    try {
                        const response = await axios.get(`${BINANCE_REST_BASE}/klines`, {
                            params: { symbol: symbol, interval: localTimeframe, limit: 1000 }
                        });
                        const data = response.data.map(d => ({
                            time: d[0] / 1000,
                            open: parseFloat(d[1]),
                            high: parseFloat(d[2]),
                            low: parseFloat(d[3]),
                            close: parseFloat(d[4]),
                        }));
                        series.setData(data);
                        setCurrentPrice(data[data.length - 1].close);
                    } catch (err) {
                        console.error(`Error fetching history for ${symbol}:`, err);
                    }
                };

                fetchHistory();

                const ws = new WebSocket(`${BINANCE_WS_BASE}/${symbol.toLowerCase()}@kline_${localTimeframe}`);
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    const k = data.k;
                    const candle = {
                        time: k.t / 1000,
                        open: parseFloat(k.o),
                        high: parseFloat(k.h),
                        low: parseFloat(k.l),
                        close: parseFloat(k.c),
                    };
                    if (seriesRef.current) {
                        seriesRef.current.update(candle);
                        setCurrentPrice(candle.close);
                    }
                };
                wsRef.current = ws;

                const resizeObserver = new ResizeObserver(entries => {
                    if (entries.length === 0 || entries[0].target !== chartContainerRef.current) return;
                    const newRect = entries[0].contentRect;
                    if (chartRef.current) {
                        chartRef.current.applyOptions({ width: newRect.width, height: newRect.height });
                    }
                });
                resizeObserver.observe(chartContainerRef.current);

                return () => {
                    resizeObserver.disconnect();
                    if (wsRef.current) wsRef.current.close();
                    if (chartRef.current) chartRef.current.remove();
                };
            }, [symbol, localTimeframe]);

            useEffect(() => {
                if (chartRef.current) {
                    chartRef.current.applyOptions({
                        handleScroll: isExpanded,
                        handleScale: isExpanded,
                        timeScale: {
                            timeVisible: true,
                            borderVisible: isExpanded,
                        },
                        rightPriceScale: {
                            borderVisible: isExpanded,
                        }
                    });
                }
            }, [isExpanded]);

            return (
                <div className="h-full w-full relative">
                    <div className={`absolute inset-0 bg-transparent rounded-xl border border-slate-800/30 border-dashed ${isExpanded ? 'block' : 'hidden'}`}></div>
                    
                    <div className={`transition-all duration-300 overflow-hidden ${
                        isExpanded 
                        ? 'fixed inset-4 z-50 bg-card rounded-2xl border-2 border-accent shadow-[0_0_50px_rgba(0,255,136,0.15)] flex flex-col p-4' 
                        : 'absolute inset-0 bg-card/40 rounded-xl border border-slate-800 p-2 group hover:border-accent/30'
                    }`}>
                        <div className="flex justify-between items-center mb-1 px-1 h-[20px] shrink-0" onClick={!isExpanded ? onToggleExpand : undefined} style={{ cursor: !isExpanded ? 'pointer' : 'default' }}>
                            <div className="flex items-center gap-2 overflow-hidden">
                                <span className="text-[10px] font-mono text-slate-500 shrink-0">#{index + 1}</span>
                                <span className="font-bold text-xs tracking-wide text-slate-200 group-hover:text-accent transition-colors shrink-0">{symbol.replace('USDT', '')}</span>
                                
                                {pairData && (
                                    <div className={`flex items-center ${isExpanded ? 'gap-3 ml-3 text-[10px]' : 'gap-1.5 ml-1.5 text-[7px] opacity-80'} font-mono whitespace-nowrap overflow-hidden`}>
                                        <span className="text-slate-400">
                                            {isExpanded ? (t?.volume || 'Vol') + ':' : 'V:'} <span className="text-slate-200">{volume}</span>
                                        </span>
                                        <span className="text-slate-400">
                                            {isExpanded ? 'Chg:' : 'Δ:'} <span className={isUp ? 'text-up' : 'text-down'}>{isUp?'+':''}{priceChange}%</span>
                                        </span>
                                        <span className="text-slate-400">
                                            {isExpanded ? (t?.volatility || 'Volat') + ':' : 'Vl:'} <span className="text-slate-200">{vol}%</span>
                                        </span>
                                        <span className="text-slate-400">
                                            {isExpanded ? (t?.trades || 'Trades') + ':' : 'T:'} <span className="text-slate-200">{trades}</span>
                                        </span>
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex flex-col items-end">
                                    <span className="text-[11px] font-mono font-medium text-slate-100">
                                        {currentPrice ? currentPrice.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 6 }) : '...'}
                                    </span>
                                </div>
                                {isExpanded && (
                                    <button onClick={(e) => { e.stopPropagation(); onToggleExpand(); }} className="text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 rounded-full w-6 h-6 flex items-center justify-center transition-colors cursor-pointer">
                                        ✕
                                    </button>
                                )}
                                {!isExpanded && (
                                    <button className="text-slate-500 hover:text-accent opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                                        ⛶
                                    </button>
                                )}
                            </div>
                        </div>
                        <div ref={chartContainerRef} className={`w-full ${isExpanded ? 'flex-1 mt-2 min-h-0' : 'chart-container'}`}></div>
                        
                        {isExpanded && (
                            <div className="flex justify-between items-center mt-3 pt-3 border-t border-slate-800/50 shrink-0">
                                <div className="flex gap-2">
                                    {[
                                        { id: '1m', label: t?.tf_1m || '1m' },
                                        { id: '5m', label: t?.tf_5m || '5m' },
                                        { id: '15m', label: t?.tf_15m || '15m' },
                                        { id: '1h', label: t?.tf_1h || '1h' },
                                        { id: '1d', label: t?.tf_1d || '1d' }
                                    ].map(tf => (
                                        <button
                                            key={tf.id}
                                            onClick={(e) => { e.stopPropagation(); setLocalTimeframe(tf.id); }}
                                            className={`px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all duration-300 ${
                                                localTimeframe === tf.id 
                                                ? 'bg-accent text-bg shadow-[0_0_15px_var(--accent-glow)]' 
                                                : 'bg-bg/50 text-slate-400 hover:text-white hover:bg-slate-800 border border-slate-700/50'
                                            }`}
                                        >
                                            {tf.label}
                                        </button>
                                    ))}
                                </div>
                                <div className="text-[10px] font-mono text-slate-500 bg-bg/50 px-2 py-1 rounded border border-slate-800">
                                    {symbol.replace('USDT', '')} / {localTimeframe.toUpperCase()}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [allTickers, setAllTickers] = useState([]);
            const [sortMode, setSortMode] = useState('volume');
            const [timeframe, setTimeframe] = useState('1m');
            const [loading, setLoading] = useState(true);
            const [lang, setLang] = useState(localStorage.getItem('selectedLanguage') || 'ENG');
            const [expandedSymbol, setExpandedSymbol] = useState(null);
            const [showInfo, setShowInfo] = useState(false);

            // Detect language change
            useEffect(() => {
                const checkLang = () => {
                    const currentLang = localStorage.getItem('selectedLanguage') || 'ENG';
                    if (currentLang !== lang) setLang(currentLang);
                };
                const interval = setInterval(checkLang, 1000);
                window.addEventListener('storage', checkLang);
                return () => {
                    clearInterval(interval);
                    window.removeEventListener('storage', checkLang);
                };
            }, [lang]);

            const fetchTickers = async () => {
                try {
                    const response = await axios.get(`${BINANCE_REST_BASE}/ticker/24hr`);
                    const usdtPairs = response.data.filter(t => 
                        t.symbol.endsWith('USDT') && 
                        parseFloat(t.quoteVolume) > 10000 &&
                        !t.symbol.includes('UP') && !t.symbol.includes('DOWN') && 
                        !t.symbol.includes('BEAR') && !t.symbol.includes('BULL')
                    );
                    setAllTickers(usdtPairs);
                    setLoading(false);
                } catch (err) {
                    console.error("Error fetching tickers:", err);
                }
            };

            useEffect(() => {
                fetchTickers();
                const interval = setInterval(fetchTickers, 60000);
                return () => clearInterval(interval);
            }, []);

            const topPairs = useMemo(() => {
                if (!allTickers.length) return [];
                let sorted = [...allTickers];
                switch (sortMode) {
                    case 'volume': sorted.sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume)); break;
                    case 'gainers': sorted.sort((a, b) => parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent)); break;
                    case 'volatility': sorted.sort((a, b) => {
                        const volA = (parseFloat(a.highPrice) - parseFloat(a.lowPrice)) / parseFloat(a.lowPrice);
                        const volB = (parseFloat(b.highPrice) - parseFloat(b.lowPrice)) / parseFloat(b.lowPrice);
                        return volB - volA;
                    }); break;
                    case 'trades': sorted.sort((a, b) => parseInt(b.count) - parseInt(a.count)); break;
                }
                return sorted.slice(0, 9);
            }, [allTickers, sortMode]);

            const t = TRANSLATIONS[lang] || TRANSLATIONS.ENG;

            if (loading) return <LoadingSpinner lang={lang} />;

            return (
                <div className="h-screen flex flex-col p-3 gap-3">
                    {/* Header / Control Bar */}
                    <div className="flex justify-between items-center bg-card/60 backdrop-blur-md px-5 py-2 rounded-xl border border-slate-800 shadow-xl h-[50px]">
                        <div className="flex items-center gap-2">
                            <div className="w-1.5 h-5 bg-accent rounded-full shadow-[0_0_10px_var(--accent-glow)]"></div>
                            <h1 className="text-sm font-mono font-bold tracking-tighter text-white">{t.header_grid}<span className="text-accent">{t.header_screener}</span></h1>
                        </div>
                        
                        <div className="flex gap-2">
                            <div className="flex gap-1 p-1 bg-bg/50 rounded-lg border border-slate-700/30">
                                {[
                                    { id: '1m', label: t.tf_1m },
                                    { id: '5m', label: t.tf_5m },
                                    { id: '15m', label: t.tf_15m },
                                    { id: '1h', label: t.tf_1h },
                                    { id: '1d', label: t.tf_1d }
                                ].map(tf => (
                                    <button
                                        key={tf.id}
                                        onClick={() => setTimeframe(tf.id)}
                                        className={`px-2 py-1 rounded-md text-[9px] font-bold transition-all duration-300 ${
                                            timeframe === tf.id 
                                            ? 'bg-accent text-bg shadow-[0_0_10px_var(--accent-glow)]' 
                                            : 'text-slate-400 hover:text-white hover:bg-slate-800'
                                        }`}
                                    >
                                        {tf.label}
                                    </button>
                                ))}
                            </div>

                            <div className="flex gap-2 p-1 bg-bg/50 rounded-lg border border-slate-700/30">
                                {[
                                    { id: 'volume', label: t.volume, icon: '📊' },
                                    { id: 'gainers', label: t.gainers, icon: '🚀' },
                                    { id: 'volatility', label: t.volatility, icon: '⚡' },
                                    { id: 'trades', label: t.trades, icon: '🔥' }
                                ].map(mode => (
                                    <button
                                        key={mode.id}
                                        onClick={() => setSortMode(mode.id)}
                                        className={`px-3 py-1 rounded-md text-[9px] font-bold transition-all duration-300 flex items-center gap-1.5 ${
                                            sortMode === mode.id 
                                            ? 'bg-accent text-bg shadow-[0_0_15px_var(--accent-glow)]' 
                                            : 'text-slate-400 hover:text-white hover:bg-slate-800'
                                        }`}
                                    >
                                        <span>{mode.icon}</span>
                                        {mode.label}
                                    </button>
                                ))}
                            </div>
                            
                            <div className="flex p-1 bg-bg/50 rounded-lg border border-slate-700/30">
                                <button
                                    onClick={() => setShowInfo(true)}
                                    className="px-2 rounded-md text-slate-400 hover:text-accent flex items-center justify-center transition-all cursor-pointer"
                                    title={t.info_title}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 3x3 Grid */}
                    <div className="flex-1 grid grid-cols-3 grid-rows-3 gap-2 overflow-hidden relative">
                        {topPairs.map((pair, idx) => (
                            <ChartCell 
                                key={pair.symbol} 
                                symbol={pair.symbol} 
                                pairData={pair}
                                index={idx} 
                                timeframe={timeframe} 
                                isExpanded={expandedSymbol === pair.symbol}
                                onToggleExpand={() => setExpandedSymbol(expandedSymbol === pair.symbol ? null : pair.symbol)}
                                t={t}
                            />
                        ))}
                    </div>

                    {/* Footer */}
                    <div className="flex justify-between items-center text-[9px] text-slate-500 font-mono px-2 h-[15px]">
                        <div className="flex gap-3">
                            <span>BINANCE API</span>
                            <span>{timeframe.toUpperCase()} INTERVAL</span>
                        </div>
                        <div className="flex items-center gap-1.5">
                            <span className="w-1 h-1 bg-accent rounded-full animate-pulse shadow-[0_0_5px_var(--accent-glow)]"></span>
                            {t.live}
                        </div>
                    </div>

                    {/* Info Modal */}
                    {showInfo && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-bg/80 backdrop-blur-sm" onClick={() => setShowInfo(false)}>
                            <div className="bg-card border border-slate-700 rounded-xl max-w-lg w-full p-5 shadow-[0_0_50px_rgba(0,255,136,0.15)] mx-4" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-sm font-mono font-bold text-white flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                                        {t.info_title}
                                    </h2>
                                    <button onClick={() => setShowInfo(false)} className="text-slate-500 hover:text-white transition-colors cursor-pointer">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                    </button>
                                </div>
                                <div className="space-y-3 text-xs text-slate-300 font-sans leading-relaxed">
